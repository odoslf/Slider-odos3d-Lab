{% assign es_target = include.es_url | default: '/' %}
{% assign en_target = include.en_url | default: '/en/' %}
{% assign current_lang = include.lang | default: 'es' %}
<nav class="public-lang-switch" aria-label="{% if current_lang == 'en' %}Language switch{% else %}Selector de idioma{% endif %}">
  <a href="{{ es_target | relative_url }}" class="lang-pill {% if current_lang == 'es' %}is-active{% endif %}" {% if current_lang == 'es' %}aria-current="page"{% endif %} lang="es">ES</a>
  <a href="{{ en_target | relative_url }}" class="lang-pill {% if current_lang == 'en' %}is-active{% endif %}" {% if current_lang == 'en' %}aria-current="page"{% endif %} lang="en">EN</a>
</nav>
