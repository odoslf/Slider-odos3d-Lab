{% assign es_target = include.es_url | default: '/' %}
{% assign en_target = include.en_url | default: '/en/' %}
{% assign current_lang = include.lang | default: 'es' %}

<div class="public-lang-switch" aria-label="Language switcher">
  <a class="lang-pill {% if current_lang == 'es' %}is-active{% endif %}" href="{{ es_target | relative_url }}">ES</a>
  <a class="lang-pill {% if current_lang == 'en' %}is-active{% endif %}" href="{{ en_target | relative_url }}">EN</a>
</div>
