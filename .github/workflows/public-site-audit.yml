name: Public Site Audit

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/public_site_audit.py'
      - '.github/workflows/public-site-audit.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/public_site_audit.py'
      - '.github/workflows/public-site-audit.yml'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run public site audit
        run: python scripts/public_site_audit.py
